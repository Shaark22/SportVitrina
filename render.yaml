# Render Blueprint — SPORT KING
# Recommended: Starter plan (no sleep, stable for production).
# Persistent disk keeps store.json, uploads, and analytics across redeploys.
services:
  - type: web
    name: sport-king
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    disk:
      name: sport-king-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PATH
        value: sk-manage-kz8m2p
      # Baked into Vite at build time — must match ADMIN_PATH (with leading slash)
      - key: VITE_ADMIN_BASE
        value: /sk-manage-kz8m2p
      # Optional override; default matches disk mountPath above
      - key: DATA_DIR
        value: /opt/render/project/src/server/data

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../design-system.css" />
  <style>
    .slide-3 .scene-bg { background-position: 70% center; }
    .slide-3 .side-panel {
      position: absolute;
      top: 72px;
      left: 72px;
      z-index: 3;
      width: 420px;
    }
    .slide-3 .headline { font-size: 64px; margin-top: 24px; }
    .slide-3 .stat-grid { margin-top: 36px; }
  </style>
</head>
<body>
  <div class="slide slide-3">
    <div class="scene-bg" style="background-image: url('{{SCENE_IMAGE}}')"></div>
    <div class="overlay-vignette"></div>
    <div class="overlay-bottom"></div>

    <div class="side-panel">
      <div class="badge-pill">Усиленный каркас</div>
      <h1 class="headline">
        Выдержит<br />
        <span class="headline-accent">200 кг</span>
      </h1>
      <p class="subline" style="font-size: 20px; max-width: 360px;">
        Сталь, надёжное крепление и конструкция для интенсивных домашних тренировок.
      </p>

      <div class="stat-grid">
        <div class="stat">
          <div class="stat-value">200 <span style="font-size: 24px;">кг</span></div>
          <div class="stat-label">Максимальная нагрузка</div>
        </div>
        <div class="stat">
          <div class="stat-value">10 <span style="font-size: 24px;">лет</span></div>
          <div class="stat-label">Гарантия производителя</div>
        </div>
        <div class="stat">
          <div class="stat-value">105 <span style="font-size: 24px;">см</span></div>
          <div class="stat-label">Длина перекладины</div>
        </div>
      </div>
    </div>

    <div class="brand-mark">Sport King</div>
    <div class="slide-counter">Slide 3/5</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../design-system.css" />
  <style>
    .slide-4 .scene-bg {
      background-size: cover;
      background-position: 62% center;
    }
    .slide-4 .top-block { max-width: 560px; }
    .slide-4 .bottom-row {
      margin-top: auto;
      padding: 0 72px 72px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
    }
  </style>
</head>
<body>
  <div class="slide slide-4">
    <div class="scene-bg" style="background-image: url('{{SCENE_IMAGE}}')"></div>
    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>

    <div class="content">
      <div class="top-block">
        <div class="eyebrow">Домашний формат</div>
        <h1 class="headline headline-xl">
          Тренировка<br />
          <span class="headline-accent">без зала</span>
        </h1>
        <p class="subline">Компактный комплекс для современной квартиры. Сильнее каждый день — у себя дома.</p>
      </div>

      <div class="bottom-row">
        <div class="brand-mark" style="position: static;">Sport King</div>
        <div class="time-chip">
          <strong>20 мин</strong>
          <span>для себя каждый день</span>
        </div>
      </div>
    </div>

    <div class="slide-counter">Slide 4/5</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../design-system.css" />
  <style>
    .slide-5 .scene-bg {
      background-size: contain;
      background-position: center 42%;
    }
    .slide-5 .overlay-bottom {
      inset: 45% 0 0 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.55) 50%, transparent 100%);
    }
    .slide-5 .bottom-row {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 72px;
      z-index: 3;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
    }
    .slide-5 .headline { font-size: 84px; }
    .slide-5 .meta {
      margin-top: 16px;
      max-width: 420px;
      font-size: 20px;
      line-height: 1.45;
      color: var(--muted);
    }
    .slide-5 .eyebrow-top {
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="slide slide-5">
    <div class="scene-bg" style="background-image: url('{{SCENE_IMAGE}}')"></div>
    <div class="overlay-bottom"></div>

    <div class="eyebrow-top eyebrow">SportKing 3 в 1 · белый</div>

    <div class="bottom-row">
      <div>
        <h1 class="headline">Начни<br />сегодня</h1>
        <p class="meta">Сила. Результат. Домашние тренировки без компромиссов.</p>
      </div>
      <div class="cta">Купить сейчас</div>
    </div>

    <div class="slide-counter">Slide 5/5</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../design-system.css" />
  <style>
    .slide-1 .scene-bg {
      background-size: contain;
      background-position: center 52%;
      background-color: #050505;
    }

    .slide-1 .overlay-top {
      inset: 0 0 72% 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.92) 0%, rgba(0, 0, 0, 0.55) 70%, transparent 100%);
    }

    .slide-1 .overlay-bottom {
      inset: 78% 0 0 0;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.95) 0%, transparent 100%);
    }

    .slide-1 .top-block {
      padding: 48px 56px 0;
      text-align: left;
    }

    .slide-1 .headline {
      font-size: 44px;
      line-height: 1.05;
      max-width: 680px;
    }

    .slide-1 .hook {
      margin-top: 16px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .slide-1 .cta-strip {
      position: absolute;
      left: 56px;
      right: 56px;
      bottom: 48px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .slide-1 .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .slide-1 .tag {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.45);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white);
    }

    .slide-1 .tag-accent {
      border-color: rgba(217, 255, 0, 0.35);
      color: var(--accent);
    }

    .slide-1 .cta {
      margin: 0;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="slide slide-1">
    <div class="scene-bg" style="background-image: url('{{SCENE_IMAGE}}')"></div>
    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>

    <div class="content">
      <div class="top-block">
        <h1 class="headline">
          Турник SportKing<br />
          3 в 1 усиленный белый
        </h1>
        <p class="hook">3 тренировки · 1 снаряд · 200 кг</p>
      </div>
    </div>

    <div class="cta-strip">
      <div class="tags">
        <span class="tag tag-accent">3 в 1</span>
        <span class="tag">200 кг</span>
        <span class="tag">RU</span>
      </div>
      <div class="cta">Смотреть →</div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../design-system.css" />
  <style>
    .slide-2 .scene-bg {
      background-size: contain;
      background-position: center 58%;
      background-color: #000;
    }
    .slide-2 .top-block { text-align: center; padding-top: 56px; }
    .slide-2 .headline { font-size: 58px; }
    .slide-2 .subline { font-size: 24px; }
  </style>
</head>
<body>
  <div class="slide slide-2">
    <div class="scene-bg" style="background-image: url('{{SCENE_IMAGE}}')"></div>
    <div class="overlay-top"></div>

    <div class="content">
      <div class="top-block">
        <h1 class="headline">Один комплекс.<br />Три тренировки.</h1>
        <p class="subline">Ваш домашний фитнес-центр.</p>
      </div>
    </div>

    <div class="panel-labels">
      <div class="panel-label">
        <h3>Подтягивания</h3>
        <p>Широкие мышцы спины</p>
      </div>
      <div class="panel-label">
        <h3>Брусья</h3>
        <p>Трицепсы, грудь</p>
      </div>
      <div class="panel-label">
        <h3>Пресс</h3>
        <p>Мышцы пресса</p>
      </div>
    </div>

    <div class="brand-mark">Sport King</div>
    <div class="slide-counter">Slide 2/5</div>
  </div>
</body>
</html>

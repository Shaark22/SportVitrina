<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="w1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#D4D4D4"/>
    </linearGradient>
    <linearGradient id="w2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCFCFC"/>
      <stop offset="100%" stop-color="#C9C9C9"/>
    </linearGradient>
    <linearGradient id="w3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ECECEC"/>
      <stop offset="100%" stop-color="#BDBDBD"/>
    </linearGradient>
    <linearGradient id="pad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#303030"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="grip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="45%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- wall brackets -->
    <rect x="132" y="28" width="36" height="20" rx="2" fill="url(#w3)" stroke="#AFAFAF"/>
    <rect x="832" y="28" width="36" height="20" rx="2" fill="url(#w3)" stroke="#AFAFAF"/>
    <circle cx="142" cy="38" r="3.2" fill="#777"/>
    <circle cx="160" cy="38" r="3.2" fill="#777"/>
    <circle cx="842" cy="38" r="3.2" fill="#777"/>
    <circle cx="860" cy="38" r="3.2" fill="#777"/>

    <!-- top frame -->
    <rect x="122" y="48" width="756" height="18" rx="4" fill="url(#w1)" stroke="#CBCBCB"/>

    <!-- wide grip down arms -->
    <path d="M122 57 L78 132 L96 142 L132 66 Z" fill="url(#w2)" stroke="#CBCBCB"/>
    <path d="M878 57 L922 132 L904 142 L868 66 Z" fill="url(#w2)" stroke="#CBCBCB"/>

    <!-- wide grips -->
    <rect x="68" y="126" width="38" height="98" rx="9" fill="url(#grip)"/>
    <rect x="894" y="126" width="38" height="98" rx="9" fill="url(#grip)"/>
    <rect x="68" y="126" width="38" height="9" rx="4.5" fill="#D62828"/>
    <rect x="68" y="215" width="38" height="9" rx="4.5" fill="#D62828"/>
    <rect x="894" y="126" width="38" height="9" rx="4.5" fill="#D62828"/>
    <rect x="894" y="215" width="38" height="9" rx="4.5" fill="#D62828"/>

    <!-- center parallel rungs -->
    <rect x="360" y="66" width="16" height="78" rx="3" fill="url(#w2)" stroke="#CBCBCB"/>
    <rect x="420" y="66" width="16" height="78" rx="3" fill="url(#w2)" stroke="#CBCBCB"/>
    <rect x="480" y="66" width="16" height="78" rx="3" fill="url(#w2)" stroke="#CBCBCB"/>
    <rect x="540" y="66" width="16" height="78" rx="3" fill="url(#w2)" stroke="#CBCBCB"/>
    <rect x="600" y="66" width="16" height="78" rx="3" fill="url(#w2)" stroke="#CBCBCB"/>

    <!-- center grip foams -->
    <rect x="356" y="138" width="24" height="62" rx="8" fill="url(#grip)"/>
    <rect x="416" y="138" width="24" height="62" rx="8" fill="url(#grip)"/>
    <rect x="536" y="138" width="24" height="62" rx="8" fill="url(#grip)"/>
    <rect x="596" y="138" width="24" height="62" rx="8" fill="url(#grip)"/>
    <rect x="356" y="138" width="24" height="7" rx="3.5" fill="#D62828"/>
    <rect x="356" y="193" width="24" height="7" rx="3.5" fill="#D62828"/>
    <rect x="596" y="138" width="24" height="7" rx="3.5" fill="#D62828"/>
    <rect x="596" y="193" width="24" height="7" rx="3.5" fill="#D62828"/>

    <!-- rings -->
    <ellipse cx="360" cy="92" rx="11" ry="13" stroke="#B5B5B5" stroke-width="4.5" fill="none"/>
    <ellipse cx="500" cy="92" rx="11" ry="13" stroke="#B5B5B5" stroke-width="4.5" fill="none"/>
    <ellipse cx="640" cy="92" rx="11" ry="13" stroke="#B5B5B5" stroke-width="4.5" fill="none"/>

    <!-- vertical posts -->
    <rect x="122" y="66" width="18" height="458" rx="4" fill="url(#w2)" stroke="#CBCBCB"/>
    <rect x="860" y="66" width="18" height="458" rx="4" fill="url(#w2)" stroke="#CBCBCB"/>

    <!-- backrest -->
    <rect x="300" y="262" width="400" height="58" rx="9" fill="url(#pad)" stroke="#2A2A2A" stroke-width="1.5"/>
    <rect x="300" y="262" width="400" height="12" rx="9" fill="#404040" opacity="0.35"/>
    <text x="500" y="299" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2.5">SPORTKING</text>

    <!-- armrest pads -->
    <rect x="104" y="302" width="52" height="148" rx="9" fill="url(#pad)" stroke="#2A2A2A" stroke-width="1.5"/>
    <rect x="844" y="302" width="52" height="148" rx="9" fill="url(#pad)" stroke="#2A2A2A" stroke-width="1.5"/>
    <rect x="104" y="302" width="52" height="14" rx="9" fill="#404040" opacity="0.35"/>
    <rect x="844" y="302" width="52" height="14" rx="9" fill="#404040" opacity="0.35"/>

    <!-- lower connector -->
    <rect x="122" y="514" width="756" height="16" rx="4" fill="url(#w1)" stroke="#CBCBCB"/>

    <!-- dip forward arms -->
    <path d="M140 530 L140 574 L286 574 L286 612 L140 612 Z" fill="url(#w2)" stroke="#CBCBCB"/>
    <path d="M714 530 L714 574 L860 574 L860 612 L714 612 Z" fill="url(#w2)" stroke="#CBCBCB"/>

    <!-- dip horizontal grips -->
    <rect x="248" y="562" width="96" height="20" rx="9" fill="url(#grip)"/>
    <rect x="656" y="562" width="96" height="20" rx="9" fill="url(#grip)"/>
    <rect x="248" y="562" width="96" height="6" rx="3" fill="#D62828"/>
    <rect x="248" y="576" width="96" height="6" rx="3" fill="#D62828"/>
    <rect x="656" y="562" width="96" height="6" rx="3" fill="#D62828"/>
    <rect x="656" y="576" width="96" height="6" rx="3" fill="#D62828"/>

    <!-- dip vertical handles -->
    <rect x="258" y="612" width="20" height="108" rx="9" fill="url(#grip)"/>
    <rect x="722" y="612" width="20" height="108" rx="9" fill="url(#grip)"/>
    <rect x="258" y="612" width="20" height="7" rx="3.5" fill="#D62828"/>
    <rect x="258" y="713" width="20" height="7" rx="3.5" fill="#D62828"/>
    <rect x="722" y="612" width="20" height="7" rx="3.5" fill="#D62828"/>
    <rect x="722" y="713" width="20" height="7" rx="3.5" fill="#D62828"/>

    <!-- corner caps -->
    <rect x="118" y="44" width="26" height="26" rx="5" fill="#EFEFEF" stroke="#BDBDBD"/>
    <rect x="856" y="44" width="26" height="26" rx="5" fill="#EFEFEF" stroke="#BDBDBD"/>
    <rect x="118" y="510" width="26" height="26" rx="5" fill="#EFEFEF" stroke="#BDBDBD"/>
    <rect x="856" y="510" width="26" height="26" rx="5" fill="#EFEFEF" stroke="#BDBDBD"/>
  </g>
</svg>
